name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
  id-token: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            이 PR의 변경된 코드를 리뷰해줘.
            버그, 보안 문제(SQL injection 등), 비효율 코드, 안티패턴을 중점적으로 보고
            문제가 있으면 파일:줄번호와 함께 한국어로 PR 코멘트를 남겨줘.
            문제가 없으면 "이상 없음"이라고 알려줘.
          claude_args: '--model claude-haiku-4-5-20251001'
